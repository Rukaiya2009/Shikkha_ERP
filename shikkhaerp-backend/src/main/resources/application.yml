spring:
  application:
    name: ShikkhaERP
  profiles:
    active: dev
  
  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/shikkhaerp
    username: postgres
    password: Farhana251@
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
    open-in-view: false
  
  # Email disabled for development (verification links will be logged to console)
  mail:
    host: localhost
    port: 25
    username: dummy
    password: dummy
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  
  # Disable H2 console
  h2:
    console:
      enabled: false
  
  # CORS Configuration
  web:
    cors:
      allowed-origins:
        - "http://localhost:5173"
        - "http://localhost:3000"
      allowed-methods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "OPTIONS"
        - "PATCH"
      allowed-headers:
        - "*"
      allow-credentials: true
      max-age: 3600

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

logging:
  level:
    com.shikkhaerp: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO
    org.springframework.web.cors: DEBUG  # Added CORS logging
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

app:
  name: ShikkhaERP
  version: 1.0.0
  base-url: ${BASE_URL:http://localhost:8080}
  
  security:
    jwt:
      secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000
      refresh-expiration: 604800000
  
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}