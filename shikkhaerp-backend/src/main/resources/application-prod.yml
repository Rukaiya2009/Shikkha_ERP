mail:
  host: smtp.zoho.com
  port: 465
  username: ${ZOHO_EMAIL}
  password: ${ZOHO_PASSWORD}
  properties:
    mail:
      smtp:
        auth: true
        ssl:
          enable: true
        starttls:
          enable: false
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000
