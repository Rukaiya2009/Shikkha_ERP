# =============================================
# SHIKKHAERP - Production Configuration
# =============================================

spring:
  # Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000
      leak-detection-threshold: 60000
      connection-test-query: SELECT 1
      auto-commit: false

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
        connection:
          provider_disables_autocommit: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  # Email Configuration (Zoho SMTP) — no longer used by EmailService (now via ZeptoMail HTTP API),
  # left in place harmlessly in case of rollback
  mail:
    host: smtp.zoho.com
    port: 465
    username: ${ZOHO_EMAIL}
    password: ${ZOHO_PASSWORD}
    protocol: smtps
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# ZeptoMail (Zoho's HTTP transactional email API) configuration
zeptomail:
  token: ${ZEPTOMAIL_TOKEN}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

logging:
  level:
    com.shikkhaerp: INFO
    org.springframework.mail: DEBUG
    org.springframework.security: INFO

app:
  name: ShikkhaERP
  version: 1.0.0
  base-url: ${BASE_URL}
  frontend:
    url: ${FRONTEND_URL}
  company:
    admin:
      email: ${COMPANY_ADMIN_EMAIL}

  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: 86400000
      refresh-expiration: 604800000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
  allowed-methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
  allowed-headers:
    - "*"
  allow-credentials: true
  max-age: 3600

# =============================================
# DEMO REQUEST EMAIL TEMPLATES
# =============================================
demo:
  email:
    from: ${ZOHO_EMAIL}
    subject:
      submission: "Demo Request Received - ShikkhaERP"
      approval: "Demo Request Approved - ShikkhaERP"
      rejection: "Demo Request Status Update - ShikkhaERP"
    templates:
      submission: |
        Dear {{name}},

        Thank you for your interest in ShikkhaERP!

        We have received your demo request for {{schoolName}}.
        Your request ID is: {{requestId}}

        Our team will review your request and get back to you within 24-48 hours.

        Best regards,
        ShikkhaERP Team

        Need help? Contact us at support@shikkhaerp.com

      approval: |
        Dear {{name}},

        Congratulations! Your demo request for {{schoolName}} has been APPROVED.

        Your temporary login credentials:
        URL: {{baseUrl}}
        Email: {{email}}
        Password: {{password}}

        Please login and change your password immediately.

        Best regards,
        ShikkhaERP Team

      rejection: |
        Dear {{name}},

        Thank you for your interest in ShikkhaERP.

        We regret to inform you that your demo request for {{schoolName}} has been REJECTED.

        Reason: {{reason}}

        If you have any questions, please contact us at support@shikkhaerp.com

        Best regards,
        ShikkhaERP Team

# =============================================
# ADMIN NOTIFICATION
# =============================================
notification:
  admin:
    email: ${COMPANY_ADMIN_EMAIL}
    enabled: true
    on-demo-request: true
    on-demo-approval: true
    on-demo-rejection: true