spring:
  # Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db.auarlihikwutxylhqyfc.supabase.co:5432/postgres?sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:ShikkhaERP2026}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000
      leak-detection-threshold: 60000
      connection-test-query: SELECT 1
      auto-commit: false

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  # ✅ EMAIL CONFIGURATION (ZOHO SMTP)
  mail:
    host: smtp.zoho.com
    port: 465
    username: shikkhaerp@zohomail.com
    password: "@Zoho*63?"
    protocol: smtps
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true

logging:
  level:
    com.shikkhaerp: INFO
    org.springframework.mail: DEBUG
    org.springframework.security: INFO

app:
  name: ShikkhaERP
  version: 1.0.0
  base-url: ${BASE_URL:https://shikkha-erp.onrender.com}
  frontend:
    url: ${FRONTEND_URL:https://shikkha-erp.vercel.app}
  company:
    admin:
      email: ${COMPANY_ADMIN_EMAIL:admin@shikkhaerp.com}
  
  security:
    jwt:
      secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 86400000
      refresh-expiration: 604800000

cors:
  allowed-origins:
    - "https://shikkha-erp-website.vercel.app"
    - "https://shikkha-erp.vercel.app"
    - "http://localhost:5173"
    - "http://localhost:3000"
  allowed-methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
  allowed-headers:
    - "*"
  allow-credentials: true
  max-age: 3600